global:
  serverConnector:
    addresses:
      - ${POLARIS_SERVER}:8091
    # 远程 Polaris 服务端(跨公网/VPN)时,默认 500ms 连接超时容易在多个进程同时启动
    # 时抖动失败。放宽到 3s,给 TCP 三次握手 + TLS(如开启)足够余量。
    connectTimeout: 3s
  statReporter:
    enable: true
    chain:
      - prometheus
    plugin:
      prometheus:
        type: push
        address: ${POLARIS_SERVER}:9091
        interval: 10s
