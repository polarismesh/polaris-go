global:
  serverConnector:
    addresses:
      - ${POLARIS_SERVER}:8091
  statReporter:
    enable: true
    chain:
      - prometheus
    plugin:
      prometheus:
        type: push
        address: ${POLARIS_SERVER}:9091
        interval: 10s
consumer:
  serviceRouter:
    # 本示例通过 GetAllInstances + 业务侧 metadata 过滤 + ProcessRouters
    # 的手动三段式来演示元数据过滤，所以不启用 dstMetaRouter，
    # 只保留规则路由以便演示剩余路由链的效果。
    chain:
      - ruleBasedRouter
    plugin:
      ruleBasedRouter:
        failoverType: all
