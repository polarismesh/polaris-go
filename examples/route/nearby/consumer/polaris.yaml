global:
  serverConnector:
    addresses:
      - ${POLARIS_SERVER}:8091
  # 地址提供插件，用于获取当前SDK所在的地域信息
  location:
    providers:
      - type: local
        options:
          region: ${REGION}
          zone: ${ZONE}
          campus: ${CAMPUS}
  statReporter:
    enable: true
    chain:
      - prometheus
    plugin:
      prometheus:
        type: push
        address: ${POLARIS_SERVER}:9091
        interval: 10s
consumer:
  serviceRouter:
    # 服务路由链, ProcessRouters 会按顺序走下面的路由插件
    chain:
      # 自定义路由策略
      - ruleBasedRouter
      # 就近路由策略
      - nearbyBasedRouter
    plugin:
      nearbyBasedRouter:
        # 就近路由的最小匹配级别, 范围: region/zone/campus
        matchLevel: campus
