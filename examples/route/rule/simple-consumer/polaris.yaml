global:
  serverConnector:
    addresses:
      - ${POLARIS_SERVER}:8091
  statReporter:
    enable: true
    chain:
      - prometheus
    plugin:
      prometheus:
        type: push
        address: ${POLARIS_SERVER}:9091
        interval: 60s
consumer:
  serviceRouter:
    # 服务路由链
    chain:
      # 启用规则路由, GetOneInstance 会自动按控制台上配置的路由规则进行实例过滤
      - ruleBasedRouter
    plugin:
      ruleBasedRouter:
        # 规则匹配失败时的动作, all 代表返回所有实例, none 表示返回空列表, 默认 all
        failoverType: all
